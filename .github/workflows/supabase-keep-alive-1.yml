name: Keep Supabase Alive Insert

on:
  schedule:
    - cron: '0 3 * * 0,3'     # Runs Sunday + Wednesday at 03:00 UTC (safer buffer)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Strong Keep-Alive Ping (INSERT + DELETE)
        run: |
          echo "🔍 Sending strong keep-alive to Supabase..."

          # Insert a row
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"ping_time": "now()"}'

          # Delete the oldest row (keeps table tiny)
          curl -s -X DELETE "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?order=id.asc&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

          echo "✅ Strong ping completed (INSERT + DELETE)"