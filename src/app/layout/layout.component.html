<div class="flex h-screen overflow-hidden bg-background">

  <!-- ─────────────────────────────────────── SIDEBAR -->
  <aside
    class="flex flex-col flex-shrink-0 bg-card border-r border-border overflow-hidden transition-all duration-300 ease-in-out"
    [class.w-60]="isSidebarExpanded()"
    [class.w-16]="!isSidebarExpanded()">

    <!-- Brand -->
    <div class="flex items-center h-16 border-b border-border flex-shrink-0"
      [class.gap-3]="isSidebarExpanded()"
      [class.px-5]="isSidebarExpanded()"
      [class.justify-center]="!isSidebarExpanded()">
      <span class="text-2xl flex-shrink-0 leading-none">🧳</span>
      @if (isSidebarExpanded()) {
        <span class="font-bold text-foreground text-sm whitespace-nowrap">VoyageLedger</span>
      }
    </div>

    <!-- Nav items -->
    <nav class="flex-1 py-3 px-2 overflow-y-auto overflow-x-hidden">

      <!-- Dashboard -->
      <a routerLink="/dashboard" routerLinkActive="sidebar-nav-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center py-2.5 w-full rounded-lg text-sm text-muted-foreground hover:bg-muted hover:text-foreground transition-colors duration-150 mb-0.5"
        [class.gap-3]="isSidebarExpanded()"
        [class.px-3]="isSidebarExpanded()"
        [class.justify-center]="!isSidebarExpanded()"
        [title]="!isSidebarExpanded() ? 'Dashboard' : ''">
        <svg class="w-[18px] h-[18px] flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        @if (isSidebarExpanded()) {
          <span class="whitespace-nowrap">Dashboard</span>
        }
      </a>

      <!-- My Trips -->
      <a routerLink="/dashboard"
        class="flex items-center py-2.5 w-full rounded-lg text-sm text-muted-foreground hover:bg-muted hover:text-foreground transition-colors duration-150 mb-0.5"
        [class.gap-3]="isSidebarExpanded()"
        [class.px-3]="isSidebarExpanded()"
        [class.justify-center]="!isSidebarExpanded()"
        [title]="!isSidebarExpanded() ? 'My Trips' : ''">
        <svg class="w-[18px] h-[18px] flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
        </svg>
        @if (isSidebarExpanded()) {
          <span class="whitespace-nowrap">My Trips</span>
        }
      </a>

      <!-- Expenses -->
      <a routerLink="/expenses" routerLinkActive="sidebar-nav-active"
        class="flex items-center py-2.5 w-full rounded-lg text-sm text-muted-foreground hover:bg-muted hover:text-foreground transition-colors duration-150 mb-0.5"
        [class.gap-3]="isSidebarExpanded()"
        [class.px-3]="isSidebarExpanded()"
        [class.justify-center]="!isSidebarExpanded()"
        [title]="!isSidebarExpanded() ? 'Expenses' : ''">
        <svg class="w-[18px] h-[18px] flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/>
        </svg>
        @if (isSidebarExpanded()) {
          <span class="whitespace-nowrap">Expenses</span>
        }
      </a>

      <!-- Menu (disabled) -->
      <div class="flex items-center py-2.5 w-full rounded-lg text-sm text-muted-foreground opacity-40 cursor-default pointer-events-none mb-0.5"
        [class.gap-3]="isSidebarExpanded()"
        [class.px-3]="isSidebarExpanded()"
        [class.justify-center]="!isSidebarExpanded()"
        [title]="!isSidebarExpanded() ? 'Menu' : ''">
        <svg class="w-[18px] h-[18px] flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/>
          <circle cx="19" cy="5" r="1" fill="currentColor"/><circle cx="19" cy="12" r="1" fill="currentColor"/><circle cx="19" cy="19" r="1" fill="currentColor"/>
          <circle cx="5" cy="5" r="1" fill="currentColor"/><circle cx="5" cy="12" r="1" fill="currentColor"/><circle cx="5" cy="19" r="1" fill="currentColor"/>
        </svg>
        @if (isSidebarExpanded()) {
          <span class="whitespace-nowrap">Menu</span>
        }
      </div>

    </nav>

    <!-- Footer -->
    <div class="border-t border-border py-2 px-2">

      <!-- Account (disabled) -->
      <div class="flex items-center py-2.5 w-full rounded-lg text-sm text-muted-foreground opacity-40 cursor-default pointer-events-none mb-0.5"
        [class.gap-3]="isSidebarExpanded()"
        [class.px-3]="isSidebarExpanded()"
        [class.justify-center]="!isSidebarExpanded()"
        [title]="!isSidebarExpanded() ? 'Account' : ''">
        <svg class="w-[18px] h-[18px] flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        @if (isSidebarExpanded()) {
          <span class="whitespace-nowrap">Account</span>
        }
      </div>

      <!-- Sign Out -->
      <button (click)="signOut()"
        class="flex items-center py-2.5 w-full rounded-lg text-sm text-destructive hover:bg-destructive/10 transition-colors duration-150 cursor-pointer"
        [class.gap-3]="isSidebarExpanded()"
        [class.px-3]="isSidebarExpanded()"
        [class.justify-center]="!isSidebarExpanded()"
        [title]="!isSidebarExpanded() ? 'Sign Out' : ''">
        <svg class="w-[18px] h-[18px] flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
        </svg>
        @if (isSidebarExpanded()) {
          <span class="whitespace-nowrap">Sign Out</span>
        }
      </button>

    </div>
  </aside>

  <!-- ─────────────────────────────────────── MAIN COLUMN -->
  <div class="flex flex-col flex-1 min-w-0">

    <!-- Toolbar -->
    <header class="flex items-center gap-2 h-16 px-4 bg-card border-b border-border flex-shrink-0">

      <!-- Sidebar panel toggle -->
      <button (click)="toggleSidebar()"
        class="w-9 h-9 flex items-center justify-center rounded-lg text-muted-foreground hover:bg-muted hover:text-foreground transition-colors duration-150 flex-shrink-0"
        aria-label="Toggle sidebar">
        @if (isSidebarExpanded()) {
          <!-- Panel close icon -->
          <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2.5"/>
            <path d="M9 3v18"/>
            <path d="M15 9l-3 3 3 3"/>
          </svg>
        } @else {
          <!-- Panel open icon -->
          <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2.5"/>
            <path d="M9 3v18"/>
            <path d="M12 9l3 3-3 3"/>
          </svg>
        }
      </button>

      <div class="flex-1"></div>

      <!-- Right actions -->
      <div class="flex items-center gap-2">
        <app-theme-toggle />
        <button (click)="tripDialogService.openCreate()"
          class="flex items-center gap-1.5 px-4 py-2 bg-primary text-primary-foreground rounded-lg text-sm font-medium hover:bg-primary-dark transition-colors duration-150 whitespace-nowrap">
          <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4.5v15m7.5-7.5h-15"/>
          </svg>
          <span>New Trip</span>
        </button>
      </div>

    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden">
      <router-outlet />
    </main>

  </div>

</div>

<app-trip-form-dialog />
